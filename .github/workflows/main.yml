name: Automated API tests using Newman

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: ci

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Newman + htmlextra
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      # Start server + run tests
      - name: Start server and run Newman tests
        run: |
          echo "Starting server..."
          nohup node server.js > server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            echo "Stopping server..."
            kill $SERVER_PID || true
          }
          trap cleanup EXIT

          echo "Waiting for server readiness..."

          for i in $(seq 1 20); do
            if curl --silent --fail http://127.0.0.1:${PORT}/health > /dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Retry $i/20..."
            sleep 2
          done

          if ! curl --silent --fail http://127.0.0.1:${PORT}/health > /dev/null; then
            echo "Server failed to start"
            cat server.log || true
            exit 1
          fi

          echo "Running Newman collection..."

          newman run collection.json \
            -e environment.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export report.html \
            | tee newman-output.txt

      # Publish summary in GitHub UI
      - name: Publish API test summary
        if: always()
        run: |
          echo "## 📊 API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ -f newman-output.txt ]; then
            tail -n 200 newman-output.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No test output found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # Comment on PR (only same-repo PRs)
      - name: Comment results on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = "No test output found";

            if (fs.existsSync('newman-output.txt')) {
              output = fs.readFileSync('newman-output.txt', 'utf8')
                .split('\n')
                .slice(-200)
                .join('\n');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 API Test Results\n\`\`\`\n${output}\n\`\`\``
            });

      # Ensure report exists
      - name: Ensure report exists
        if: always()
        run: |
          if [ ! -f report.html ]; then
            echo "<html><body><h2>No report generated</h2></body></html>" > report.html
          fi

      # Upload HTML report
      - name: Upload htmlextra report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-htmlextra-report
          path: report.html

      # Upload logs
      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: server.log
