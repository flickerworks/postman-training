name: Automated API tests using Postman CLI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: ci

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set Node version (IMPORTANT for consistency)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Postman CLI
      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      # Authenticate Postman CLI
      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      # Start server + run tests
      - name: Start server and run Postman tests
        run: |
          echo "Starting server..."
          nohup node server.js > server.log 2>&1 &
          SERVER_PID=$!

          # Ensure cleanup always happens
          cleanup() {
            echo "Stopping server..."
            kill $SERVER_PID || true
          }
          trap cleanup EXIT

          echo "Waiting for server readiness..."

          for i in $(seq 1 20); do
            if curl --silent --fail http://127.0.0.1:${PORT}/health > /dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Retry $i/20..."
            sleep 2
          done

          # Final check
          if ! curl --silent --fail http://127.0.0.1:${PORT}/health > /dev/null; then
            echo "Server failed to start"
            echo "===== SERVER LOG ====="
            cat server.log || true
            exit 1
          fi

          echo "Running Postman collection..."

          postman collection run "54182200-98585201-53b1-4017-8eb4-bb323971e5f2" \
            -e "54182200-e1e6a704-e331-4a4b-b5f6-5883286fe0c0" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export report.html

      # Ensure report always exists (prevents artifact failure)
      - name: Ensure report exists
        if: always()
        run: |
          if [ ! -f report.html ]; then
            echo "Report missing. Creating fallback..."
            echo "<html><body><h2>No report generated</h2></body></html>" > report.html
          fi

      # Upload report artifact (FIXED VERSION)
      - name: Upload htmlextra report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-htmlextra-report
          path: report.html

      # Upload server logs (VERY useful for debugging)
      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: server.log
