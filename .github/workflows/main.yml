name: Automated API tests using Postman CLI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: ci

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Start server and run Postman tests
        run: |
          echo "Starting server..."
          nohup node server.js > server.log 2>&1 &
          server_pid=$!
          trap 'echo "Killing server..."; kill $server_pid || true' EXIT

          echo "Waiting for server to become ready..."
          for i in $(seq 1 15); do
            if curl --silent --fail http://127.0.0.1:3000/health > /dev/null 2>&1; then
              echo "✅ Server is ready"
              break
            fi
            echo "Waiting for server... ($i/15)"
            sleep 2
          done

          if ! curl --silent --fail http://127.0.0.1:3000/health > /dev/null 2>&1; then
            echo "❌ Server did not start in time"
            echo "===== SERVER LOG ====="
            cat server.log || true
            exit 1
          fi

          echo "Running Postman tests..."
          postman collection run "54182200-98585201-53b1-4017-8eb4-bb323971e5f2" -e "54182200-e1e6a704-e331-4a4b-b5f6-5883286fe0c0"
